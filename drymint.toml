# Generated by `drymint repo init`.
# TODO: Review generated [index].ignore and language domain defaults.
# Remove or adjust patterns that do not match this repository.

version = "v0"

[index]
# Keep indexing deterministic and low-noise for local dev.
ignore = [
  "**/.gradle/**",
  "**/.pytest_cache/**",
  "**/.venv/**",
  "**/__pycache__/**",
  "**/build/**",
  "**/dist/**",
  "**/node_modules/**",
  "**/target/**",
  "**/vendor/**",
  "**/venv/**",
  ".drymint/**",
  ".git/**",
  ".gradle/**",
  ".pytest_cache/**",
  ".venv/**",
  "__pycache__/**",
  "build/**",
  "dist/**",
  "node_modules/**",
  "target/**",
  "vendor/**",
  "venv/**",
]

[plugins.go]
enabled = true

[languages.go.domains]
rules = [
  { domain = "root", match = ["main.go"] },

  { domain = "oversync_tests", match = ["oversync/**/*_test.go"] },
  { domain = "oversync", match = ["oversync/**/*.go"] },

  { domain = "oversqlite_tests", match = ["oversqlite/**/*_test.go"] },
  { domain = "oversqlite", match = ["oversqlite/**/*.go"] },

  { domain = "oversqlite_e2e_tests", match = ["oversqlite_e2e/**/*_test.go"] },

  { domain = "example_internal", match = ["examples/internal/**/*.go"] },

  { domain = "example_nethttp_server_tests", match = ["examples/nethttp_server/**/*_test.go"] },
  { domain = "example_nethttp_server", match = ["examples/nethttp_server/**/*.go"] },

  { domain = "example_samplesync_server_tests", match = ["examples/samplesync_server/**/*_test.go"] },
  { domain = "example_samplesync_server", match = ["examples/samplesync_server/**/*.go"] },

  { domain = "example_mobile_flow_tests", match = ["examples/mobile_flow/**/*_test.go"] },
  { domain = "example_mobile_flow", match = ["examples/mobile_flow/**/*.go"] },
]
