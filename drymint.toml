version = "v0"

[index]
# Keep indexing deterministic and low-noise for local dev.
ignore = [
  ".drymint/**",
  ".git/**",
  "vendor/**",
]

[plugins.go]
enabled = true

[languages.go.domains]
rules = [
  { domain = "tests", match = ["**/*_test.go"] },
  { domain = "main", match = ["**/*.go"] },
]
